name: terraform-ec2
on: workflow_dispatch

jobs:
  build-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: install terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"

      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Plan
        run: terraform plan 

      - name: Terraform apply
        run:  terraform apply -auto-approve
