name: docker cd
on: workflow_dispatch

jobs:
  docker-cd-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: get pem file
        run: |
          echo "${{ secrets.secretfile }}" > key.pem
          chmod 400 key.pem
  
      - name: pull Image and run
        run: ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@13.201.229.181 "cd /home/ec2-user && sudo yum install docker -y && sudo echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin && sudo docker pull ${{ secrets.DOCKER_USERNAME }}/myapp:latest && sudo docker run -d -p 80:5001 ${{ secrets.DOCKER_USERNAME }}/myapp:latest" 
