name: docker cd
on: workflow_dispatch

jobs:
  docker-ci-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
  
      - name: Build Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      - name: get pem file
        run: |
          echo "${{ secrets.secretfile }}" > key.pem
          chmod 400 key.pem
  
      - name: Push Image
        run: run: ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@3.108.249.203 "sudo su cd /home/ssm-user && yum install docker -y && docker run -d -p 80:5001 myapp" 
